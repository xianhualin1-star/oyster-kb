
name: 自动增量构建生蚝AI知识库

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-kb:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}

    steps:
      - name: 检出仓库
        uses: actions/checkout@v4

      - name: 配置 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: 增量抓取并构建知识库
        run: python scripts/crawl.py

      - name: 输出统计
        run: |
          python - <<'PY'
          import json
          with open("knowledge_base.json", "r", encoding="utf-8") as f:
              kb = json.load(f)
          print("总片段：", kb.get("total"))
          print("带 URL：", kb.get("url_count"))
          print("更新时间：", kb.get("updated_at"))
          print("本次新增：", kb.get("newly_added", 0))
          PY

      - name: 提交知识库更新
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add knowledge_base.json
          git diff --staged --quiet || git commit -m "🤖 增量更新知识库 $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          git push
