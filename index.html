
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🦪 生蚝AI知识库</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: "Microsoft YaHei", "PingFang SC", Arial, sans-serif; }
    .scrollbar-thin::-webkit-scrollbar { width: 6px; }
    .scrollbar-thin::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 8px; }
    @keyframes pulse-dot { 0%,100% { opacity: 1; } 50% { opacity: .35; } }
    .loading-dot { animation: pulse-dot 1s infinite; }
  </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-sky-50 to-cyan-50">
  <main class="max-w-6xl mx-auto p-4 md:p-8">
    <header class="flex items-center justify-between mb-6">
      <div>
        <h1 class="text-2xl md:text-3xl font-bold text-cyan-800">🦪 生蚝AI知识库</h1>
        <p class="text-sm text-slate-500 mt-1">文献库增量积累 · 实时网络检索 · AI 问答与文献综述</p>
      </div>
      <button onclick="openSettings()" class="bg-white shadow rounded-full w-11 h-11 hover:bg-slate-50" title="设置">⚙️</button>
    </header>

    <section class="bg-white rounded-xl shadow-sm border border-slate-100 px-4 py-3 mb-3 flex flex-col md:flex-row md:justify-between md:items-center gap-2 text-sm">
      <span id="kbStatus" class="text-slate-500">⏳ 正在加载文献库...</span>
      <span id="kbCount" class="text-slate-400"></span>
    </section>

    <section id="categoryBar" class="flex flex-wrap gap-2 mb-5"></section>

    <nav class="flex flex-wrap gap-2 mb-4">
      <button id="tabSearch" onclick="switchTab('search')" class="tab-button px-4 py-2 rounded-lg shadow-sm bg-cyan-600 text-white">🔍 AI问答检索</button>
      <button id="tabReview" onclick="switchTab('review')" class="tab-button px-4 py-2 rounded-lg shadow-sm bg-white text-slate-600">📝 文献综述</button>
      <button id="tabBrowse" onclick="switchTab('browse')" class="tab-button px-4 py-2 rounded-lg shadow-sm bg-white text-slate-600">📚 浏览文献库</button>
    </nav>

    <section id="queryPanel" class="bg-white rounded-2xl shadow-sm border border-slate-100 p-4 mb-6">
      <textarea id="queryInput" rows="3" class="w-full resize-none border border-slate-200 rounded-lg p-3 focus:ring-2 focus:ring-cyan-400 focus:outline-none"
        placeholder="例如：太平洋牡蛎种质标准有哪些？"></textarea>
      <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-3 mt-3">
        <p class="text-xs text-slate-400">提问时会同时检索本地文献库和实时网络结果。Ctrl + Enter 可提交。</p>
        <button id="submitBtn" onclick="handleSubmit()" class="bg-cyan-600 hover:bg-cyan-700 text-white px-6 py-2 rounded-lg font-medium shadow-sm">提交查询</button>
      </div>
    </section>

    <section id="searchResult" class="space-y-4"></section>
    <section id="browseResult" class="hidden bg-white rounded-2xl shadow-sm border border-slate-100 p-4 max-h-screen overflow-y-auto scrollbar-thin"></section>
  </main>

  <div id="settingsModal" class="hidden fixed inset-0 z-50 bg-black/40 p-4 flex items-center justify-center">
    <div class="bg-white rounded-2xl shadow-xl w-full max-w-xl p-6">
      <h2 class="font-bold text-lg mb-4">⚙️ 系统设置</h2>

      <label class="block text-sm text-slate-600 mb-1">硅基流动 API Key（生成回答）</label>
      <input id="apiKeyInput" type="password" class="w-full border rounded-lg p-2 text-sm mb-4" placeholder="sk-xxxxxxxx">

      <label class="block text-sm text-slate-600 mb-1">SerpAPI Key（实时联网检索）</label>
      <input id="serpApiKeyInput" type="password" class="w-full border rounded-lg p-2 text-sm mb-1" placeholder="你的 SerpAPI API Key">
      <p class="text-xs text-slate-400 mb-4">未填写时，系统仅从本地文献库检索；填写后才会实时搜索 Google / Google Scholar 的公开结果。</p>

      <label class="block text-sm text-slate-600 mb-1">知识库 JSON 地址</label>
      <input id="kbUrlInput" type="text" class="w-full border rounded-lg p-2 text-sm mb-4"
        placeholder="./knowledge_base.json 或 https://raw.githubusercontent.com/.../knowledge_base.json">

      <label class="block text-sm text-slate-600 mb-1">模型</label>
      <select id="modelSelect" class="w-full border rounded-lg p-2 text-sm mb-4">
        <option value="deepseek-ai/DeepSeek-V3">deepseek-ai/DeepSeek-V3</option>
        <option value="deepseek-ai/DeepSeek-R1">deepseek-ai/DeepSeek-R1</option>
        <option value="Qwen/Qwen2.5-7B-Instruct">Qwen/Qwen2.5-7B-Instruct</option>
        <option value="Qwen/Qwen2.5-14B-Instruct">Qwen/Qwen2.5-14B-Instruct</option>
      </select>

      <div class="p-3 bg-amber-50 border border-amber-100 rounded-lg text-xs text-amber-700 mb-4">
        API Key 仅保存在当前浏览器 localStorage。不要在公开电脑或公开网站中填写个人密钥。
      </div>

      <div class="flex justify-end gap-2">
        <button onclick="closeSettings()" class="px-4 py-2 rounded-lg bg-slate-100 text-slate-600">取消</button>
        <button onclick="saveSettings()" class="px-4 py-2 rounded-lg bg-cyan-600 text-white">保存</button>
      </div>
    </div>
  </div>

<script>
let knowledgeBase = [];
let kbMeta = {};
let currentTab = "search";
let lastReview = "";

window.addEventListener("load", () => {
  setValue("apiKeyInput", localStorage.getItem("apiKey") || "");
  setValue("serpApiKeyInput", localStorage.getItem("serpApiKey") || "");
  setValue("modelSelect", localStorage.getItem("model") || "deepseek-ai/DeepSeek-V3");

  const savedKbUrl = localStorage.getItem("kbUrl") || "./knowledge_base.json";
  setValue("kbUrlInput", savedKbUrl);
  loadKnowledgeBase(savedKbUrl);
});

function setValue(id, value) {
  const el = document.getElementById(id);
  if (el) el.value = value;
}

function openSettings() {
  document.getElementById("settingsModal").classList.remove("hidden");
}

function closeSettings() {
  document.getElementById("settingsModal").classList.add("hidden");
}

function saveSettings() {
  localStorage.setItem("apiKey", document.getElementById("apiKeyInput").value.trim());
  localStorage.setItem("serpApiKey", document.getElementById("serpApiKeyInput").value.trim());
  localStorage.setItem("kbUrl", document.getElementById("kbUrlInput").value.trim() || "./knowledge_base.json");
  localStorage.setItem("model", document.getElementById("modelSelect").value);
  closeSettings();
  loadKnowledgeBase(localStorage.getItem("kbUrl"));
}

async function loadKnowledgeBase(url) {
  const status = document.getElementById("kbStatus");
  status.textContent = "⏳ 正在加载文献库...";

  try {
    const joiner = url.includes("?") ? "&" : "?";
    const res = await fetch(url + joiner + "t=" + Date.now());
    if (!res.ok) throw new Error("HTTP " + res.status);

    const data = await res.json();
    kbMeta = data;
    knowledgeBase = Array.isArray(data) ? data : (data.documents || []);

    const total = knowledgeBase.length;
    const urls = data.url_count ?? knowledgeBase.filter(d => d.url).length;
    const newCount = data.newly_added ?? 0;

    status.innerHTML = "✅ 文献库加载成功";
    document.getElementById("kbCount").textContent =
      `共 ${total} 条资料｜带 URL ${urls} 条｜本次新增 ${newCount} 条｜更新于 ${data.updated_at || "未知"}`;

    renderCategoryBar(data.categories || {});
    renderBrowseList();
  } catch (error) {
    console.error(error);
    knowledgeBase = [];
    status.innerHTML = "❌ 文献库加载失败，请检查 JSON 地址、仓库权限或文件是否存在";
    document.getElementById("kbCount").textContent = "";
  }
}

function renderCategoryBar(categories) {
  const bar = document.getElementById("categoryBar");
  const entries = Object.entries(categories);
  bar.innerHTML = entries.map(([name, count]) =>
    `<span class="px-3 py-1 text-xs bg-white shadow-sm rounded-full text-slate-600">${escapeHtml(name)}：${count}</span>`
  ).join("");
}

function switchTab(tab) {
  currentTab = tab;

  document.querySelectorAll(".tab-button").forEach(button => {
    button.className = "tab-button px-4 py-2 rounded-lg shadow-sm bg-white text-slate-600";
  });

  const active = document.getElementById("tab" + tab[0].toUpperCase() + tab.slice(1));
  active.className = "tab-button px-4 py-2 rounded-lg shadow-sm bg-cyan-600 text-white";

  document.getElementById("queryPanel").classList.toggle("hidden", tab === "browse");
  document.getElementById("searchResult").classList.toggle("hidden", tab === "browse");
  document.getElementById("browseResult").classList.toggle("hidden", tab !== "browse");

  const input = document.getElementById("queryInput");
  if (tab === "search") {
    input.placeholder = "例如：太平洋牡蛎种质标准有哪些？";
  }
  if (tab === "review") {
    input.placeholder = "例如：太平洋牡蛎种质资源研究进展；要求重点分析三倍体育种与养殖应用";
  }
}

document.getElementById("queryInput").addEventListener("keydown", e => {
  if (e.ctrlKey && e.key === "Enter") handleSubmit();
});

async function handleSubmit() {
  const query = document.getElementById("queryInput").value.trim();
  if (!query) return alert("请输入问题或综述主题。");

  if (currentTab === "search") await doSearch(query);
  if (currentTab === "review") await doReview(query);
}

function tokenize(text) {
  const terms = [
    "牡蛎", "生蚝", "太平洋牡蛎", "长牡蛎", "香港牡蛎","近江牡蛎","单体苗","种质", "种质资源", "标准",
    "养殖", "育苗", "苗种", "三倍体", "四倍体", "育种", "病害", "弧菌",
    "夏季死亡", "筏式", "吊养", "专利", "论文", "综述", "Crassostrea", "oyster"
  ];

  const parts = String(text)
    .replace(/[，。；、？?！!：:（）()]/g, " ")
    .split(/\s+/)
    .filter(x => x.length >= 2);

  terms.forEach(t => {
    if (text.toLowerCase().includes(t.toLowerCase())) parts.push(t);
  });

  return [...new Set(parts)];
}

function isStandardQuery(query) {
  return ["标准", "国标", "行业标准", "地方标准", "标准号", "GB/", "SC/", "DB"]
    .some(t => query.toLowerCase().includes(t.toLowerCase()));
}

function retrieveLocal(query, topK = 10) {
  const keywords = tokenize(query);
  const standard = isStandardQuery(query);

  return knowledgeBase.map(doc => {
    const title = doc.title || "";
    const body = `${title} ${doc.summary || ""} ${doc.content || ""} ${doc.category || ""} ${doc.source || ""}`.toLowerCase();
    let score = doc.url ? 2 : 0;

    keywords.forEach(word => {
      const w = word.toLowerCase();
      if (title.toLowerCase().includes(w)) score += 8;
      if ((doc.summary || "").toLowerCase().includes(w)) score += 5;
      if ((doc.category || "").toLowerCase().includes(w)) score += 4;
      if (body.includes(w)) score += 2;
    });

    if (standard && doc.url) score += 8;
    if (standard && !doc.url) score -= 8;

    return { ...doc, score, retrieval_origin: "文献库" };
  }).filter(x => x.score > 0)
    .sort((a, b) => b.score - a.score)
    .slice(0, topK);
}

async function searchOnline(query) {
  const apiKey = localStorage.getItem("serpApiKey");
  if (!apiKey) return [];

  const safeQuery = query;
  const endpoints = [
    `https://serpapi.com/search.json?engine=google&q=${encodeURIComponent(safeQuery)}&hl=zh-cn&num=8&api_key=${encodeURIComponent(apiKey)}`,
    `https://serpapi.com/search.json?engine=google_scholar&q=${encodeURIComponent(safeQuery)}&hl=zh-cn&num=8&api_key=${encodeURIComponent(apiKey)}`
  ];

  const responses = await Promise.allSettled(
    endpoints.map(url => fetch(url).then(r => {
      if (!r.ok) throw new Error("联网搜索 HTTP " + r.status);
      return r.json();
    }))
  );

  const docs = [];

  responses.forEach((result, index) => {
    if (result.status !== "fulfilled") return;

    const data = result.value;
    (data.organic_results || []).forEach(item => {
      const title = item.title || "";
      const url = item.link || "";
      const publication = item.publication_info?.summary || "";
      const snippet = item.snippet || publication || "";

      if (!title || !url) return;

      docs.push({
        id: "online-" + hashCode(title + url),
        title,
        category: "实时网络资料",
        source: index === 0 ? `实时Google检索：${getDomain(url)}` : "实时Google Scholar题录/摘要",
        source_type: index === 0 ? "online_search" : "online_scholar",
        has_url: true,
        url,
        domain: getDomain(url),
        date: "",
        summary: snippet,
        content: `标题：${title}\n来源：${index === 0 ? "实时 Google 公开检索" : "实时 Google Scholar 公开题录/摘要"}\n摘要/片段：${snippet}\nURL：${url}`,
        content_length: snippet.length,
        retrieval_origin: "实时网络检索"
      });
    });
  });

  const seen = new Set();

  return docs.filter(d => {
    const key = d.url.toLowerCase();
    if (seen.has(key)) return false;
    seen.add(key);
    return true;
  }).slice(0, 12);
}

function mergeDocs(localDocs, onlineDocs) {
  const seen = new Set();

  return [...onlineDocs, ...localDocs].filter(doc => {
    const key = (doc.url || doc.id || doc.title).toLowerCase();
    if (seen.has(key)) return false;
    seen.add(key);
    return true;
  });
}

async function doSearch(query) {
  const target = document.getElementById("searchResult");
  target.innerHTML = renderLoading("正在检索文献库和实时网络资料");

  const localDocs = retrieveLocal(query, 10);
  let onlineDocs = [];
  let onlineMessage = "";

  try {
    onlineDocs = await searchOnline(query);
    onlineMessage = localStorage.getItem("serpApiKey")
      ? `实时联网检索到 ${onlineDocs.length} 条公开结果`
      : "未配置 SerpAPI Key，本次仅检索文献库";
  } catch (error) {
    console.error(error);
    onlineMessage = "实时联网检索失败，本次仅使用文献库资料";
  }

  const docs = mergeDocs(localDocs, onlineDocs).slice(0, 16);

  if (!docs.length) {
    target.innerHTML = renderNoResult("没有检索到相关资料。请配置 SerpAPI Key 或等待每日文献库更新。");
    return;
  }

  const answer = await generateAnswer(query, docs);

  target.innerHTML = `
    <section class="bg-white rounded-2xl shadow-sm border border-slate-100 p-5">
      <div class="flex items-center justify-between gap-2 mb-3">
        <h2 class="font-bold text-cyan-700">🤖 AI 回答</h2>
        <span class="text-xs text-slate-400">${escapeHtml(onlineMessage)}</span>
      </div>
      <div class="whitespace-pre-wrap leading-7 text-slate-700">${escapeHtml(answer)}</div>
    </section>
    <section class="bg-white rounded-2xl shadow-sm border border-slate-100 p-5">
      <h2 class="font-bold text-slate-700 mb-3">📎 本次引用资料</h2>
      ${docs.map((d, i) => renderDocCard(d, i + 1)).join("")}
    </section>
  `;
}

async function generateAnswer(query, docs) {
  const context = buildContext(docs, 950);

  const prompt = `你是严谨的水产养殖知识库助手。优先依据用户问题所涉及的物种和主题回答。同时基于以下“文献库资料”和“实时网络检索资料”回答问题。

规则：
1. 涉及国家标准、行业标准、地方标准、标准编号、年份、适用范围，只能依据有 URL 的可核验资料；
2. 若没有权威 URL，请明确写“现有资料没有检索到可核验的权威标准来源链接”，绝不可编造；
3. Google Scholar、知网、万方、维普等结果片段仅是题录或摘要线索，不能当作全文结论；
4. 用[编号]标注事实依据，答案末尾列出“来源链接”；
5. 区分“文献库资料”与“实时网络检索资料”。

【资料】
${context}

【问题】
${query}`;

  return callLLM(prompt);
}

async function doReview(query) {
  const target = document.getElementById("searchResult");
  target.innerHTML = renderLoading("正在检索文献库和实时网络资料，并生成文献综述");

  const localDocs = retrieveLocal(query, 16);
  let onlineDocs = [];

  try {
    onlineDocs = await searchOnline(query);
  } catch (error) {
    console.error(error);
  }

  const docs = mergeDocs(localDocs, onlineDocs).slice(0, 22);

  if (!docs.length) {
    target.innerHTML = renderNoResult("没有可用于综述的资料。");
    return;
  }

  const context = buildContext(docs, 900);

  const prompt = `你是水产养殖领域的学术写作助手。请基于以下资料，围绕用户主题撰写中文文献综述。

写作原则：
1. 文献综述的篇幅、层级和详细程度，应根据用户问题中的明确要求自动决定；用户没有指定字数时，按主题复杂度写出完整、充分的综述；
2. 不要将文章标题固定写为“5000字文献综述”，也不要在正文中声明固定字数；
3. 结构可根据主题自动调整，通常应包括研究背景、主要进展、关键技术/方法、应用情况、问题与局限、趋势与建议、参考资料；
4. 不得脱离资料编造事实、标准编号、数据或研究结论；
5. 标准编号、年份、适用范围只能依据有 URL 的可核验资料；
6. 搜索引擎结果、Google Scholar 题录、知网/万方/维普摘要片段只能作为题录或摘要线索，不可表述为已核验全文；
7. 正文使用[1]、[2]等编号引用；结尾“参考资料与链接”逐条列出题名、来源、URL；
8. 无 URL 的本地资料可作辅助参考，但要在参考资料中注明“无外部链接，仅作辅助参考”。

【资料】
${context}

【用户的综述要求】
${query}`;

  lastReview = await callLLM(prompt);
  const characterCount = lastReview.replace(/\s/g, "").length;

  target.innerHTML = `
    <section class="bg-white rounded-2xl shadow-sm border border-slate-100 p-5">
      <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-3 mb-3">
        <h2 class="font-bold text-cyan-700">📝 文献综述：${escapeHtml(query)}</h2>
        <span class="text-xs text-slate-400">当前生成约 ${characterCount} 字</span>
      </div>
      <div class="whitespace-pre-wrap leading-7 text-slate-700">${escapeHtml(lastReview)}</div>
      <button onclick="downloadReview()" class="mt-5 px-4 py-2 rounded-lg bg-cyan-50 text-cyan-700 hover:bg-cyan-100 text-sm">⬇️ 下载 Markdown</button>
    </section>
    <section class="bg-white rounded-2xl shadow-sm border border-slate-100 p-5">
      <h2 class="font-bold text-slate-700 mb-3">📚 本次综述使用资料</h2>
      ${docs.map((d, i) => renderDocCard(d, i + 1)).join("")}
    </section>
  `;
}

function buildContext(docs, maxContent) {
  return docs.map((d, i) => `[${i + 1}]
检索来源：${d.retrieval_origin || "文献库"}
题名：${d.title || ""}
类别：${d.category || ""}
资料来源：${d.source || ""}
是否有URL：${d.url ? "是" : "否"}
URL：${d.url || "无"}
摘要：${d.summary || ""}
正文片段：${(d.content || "").slice(0, maxContent)}`).join("\n\n");
}

async function callLLM(prompt) {
  const apiKey = localStorage.getItem("apiKey");
  const model = localStorage.getItem("model") || "deepseek-ai/DeepSeek-V3";

  if (!apiKey) {
    return "⚠️ 未配置硅基流动 API Key，请在右上角设置中填写。";
  }

  try {
    const res = await fetch("https://api.siliconflow.cn/v1/chat/completions", {
      method: "POST",
      headers: {
        "Authorization": `Bearer ${apiKey}`,
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        model,
        messages: [
          {
            role: "system",
            content: "你是严谨的水产养殖科研助手。不得编造标准、论文、数据和来源。请遵循用户对文章长度和结构的要求。"
          },
          { role: "user", content: prompt }
        ],
        temperature: 0.25
      })
    });

    const data = await res.json();

    if (!res.ok) {
      return "❌ AI API 请求失败：" + (data.message || data.error?.message || JSON.stringify(data));
    }

    return data.choices?.[0]?.message?.content || "❌ AI 未返回正文。";
  } catch (error) {
    return "❌ 调用 AI 失败：" + error.message;
  }
}

function renderBrowseList() {
  const target = document.getElementById("browseResult");

  if (!knowledgeBase.length) {
    target.innerHTML = `<p class="text-center text-slate-400 py-8">文献库暂无资料。</p>`;
    return;
  }

  target.innerHTML = `
    <div class="mb-4 p-3 rounded-lg bg-cyan-50 text-xs text-cyan-800">
      文献库采用增量更新：每日新增资料会追加保存，历史资料不会因自动更新而删除。浏览资料时请优先核验 URL。
    </div>
    ${knowledgeBase.map((doc, i) => renderDocCard({ ...doc, retrieval_origin: "文献库" }, i + 1)).join("")}
  `;
}

function renderDocCard(doc, index) {
  const url = doc.url || "";

  return `<article class="border-l-4 ${url ? "border-cyan-400" : "border-amber-400"} bg-slate-50 rounded-r-lg p-3 mb-3">
    <h3 class="font-medium text-sm text-slate-800">[${index}] ${escapeHtml(doc.title || "未命名资料")}</h3>
    <p class="text-xs text-slate-500 mt-1">
      检索来源：${escapeHtml(doc.retrieval_origin || "文献库")}
      · 分类：${escapeHtml(doc.category || "未分类")}
      · 资料来源：${escapeHtml(doc.source || "未知")}
      ${doc.domain ? " · 域名：" + escapeHtml(doc.domain) : ""}
    </p>
    ${url
      ? `<p class="text-xs mt-1 break-all">🔗 <a href="${escapeAttr(url)}" target="_blank" rel="noopener noreferrer" class="text-cyan-700 hover:underline">${escapeHtml(url)}</a></p>`
      : `<p class="text-xs text-amber-600 mt-1">⚠️ 无外部 URL，仅作辅助资料，不能作为标准编号的权威依据。</p>`
    }
    <p class="text-xs text-slate-600 mt-2 leading-5">${escapeHtml((doc.summary || doc.content || "").slice(0, 420))}</p>
  </article>`;
}

function renderLoading(text) {
  return `<div class="bg-white rounded-2xl p-8 text-center shadow-sm border border-slate-100 text-slate-500"><span class="loading-dot">⏳</span> ${escapeHtml(text)}...</div>`;
}

function renderNoResult(text) {
  return `<div class="bg-white rounded-2xl p-8 text-center shadow-sm border border-slate-100 text-slate-400">😕 ${escapeHtml(text)}</div>`;
}

function downloadReview() {
  const topic = document.getElementById("queryInput").value.trim() || "牡蛎文献综述";
  const blob = new Blob([`# ${topic}\n\n${lastReview}`], {
    type: "text/markdown;charset=utf-8"
  });

  const link = document.createElement("a");
  link.href = URL.createObjectURL(blob);
  link.download = `${topic}_文献综述.md`;
  link.click();
  URL.revokeObjectURL(link.href);
}

function getDomain(url) {
  try {
    return new URL(url).hostname;
  } catch {
    return "";
  }
}

function hashCode(value) {
  let hash = 0;

  for (let i = 0; i < value.length; i++) {
    hash = ((hash << 5) - hash) + value.charCodeAt(i);
    hash |= 0;
  }

  return Math.abs(hash);
}

function escapeHtml(value) {
  return String(value || "")
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

function escapeAttr(value) {
  return escapeHtml(value);
}
</script>
</body>
